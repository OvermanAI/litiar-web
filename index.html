<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>LitiAR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:-apple-system,sans-serif; }
    #hint {
      position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.55); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      color:#fff; padding:12px 24px; border-radius:999px; font-size:15px; font-weight:500;
      display:flex; align-items:center; gap:8px; z-index:9999; pointer-events:none;
      transition:opacity 0.6s ease;
    }
    #hint.hidden { opacity:0; }
    #drag-hint {
      position:fixed; top:60px; left:50%; transform:translateX(-50%);
      background:rgba(255,210,0,0.9); color:#000;
      padding:8px 20px; border-radius:999px; font-size:13px; font-weight:700;
      z-index:9999; pointer-events:none;
      opacity:0; transition:opacity 0.4s ease;
    }
    #drag-hint.show { opacity:1; }
    .dot { width:8px;height:8px;border-radius:50%;background:#fff;animation:p 1.4s ease-in-out infinite; }
    @keyframes p { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  </style>
</head>
<body>
  <div id="hint"><div class="dot"></div>將相機對準 LitiBook 繪本頁面</div>
  <div id="drag-hint">✋ 可拖曳任何浮動元素</div>

  <a-scene
    drag-system
    mindar-image="imageTargetSrc:./litibook.mind;autoStart:true;uiLoading:yes;uiScanning:yes;uiError:yes;filterMinCF:0.001;filterBeta:10;"
    color-space="sRGB" renderer="colorManagement:true;antialias:true;"
    vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">

    <a-assets>
      <img id="yu-img"  src="./yu.png"                crossorigin="anonymous"/>
      <img id="text-tr" src="./text_top_right.png"    crossorigin="anonymous"/>
      <img id="text-bl" src="./text_bottom_left.png"  crossorigin="anonymous"/>
      <img id="text-br" src="./text_bottom_right.png" crossorigin="anonymous"/>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled:false" fov="80"></a-camera>

    <a-entity id="book-anchor" mindar-image-target="targetIndex:0">

      <!--
        ★ 可拖曳元素的結構：
           <a-entity class="draggable"
                     data-float-amp="0.03"    ← 浮動幅度（AR 單位）
                     data-float-dur="2200"    ← 浮動週期（ms）
                     position="...">
             [子元素：圖片 / 魔法陣 / 任意內容]
           </a-entity>

        這樣未來加任何新元素，只要加上 class="draggable"
        就自動可以拖曳，不需要再寫任何 JS。
      -->

      <!-- 🧒 YU 角色 -->
      <a-entity class="draggable"
                data-float-amp="0.030" data-float-dur="2200"
                position="0.03 -0.04 0.025">
        <a-image src="#yu-img" width="0.22" height="0.38"
          material="transparent:true;alphaTest:0.18;side:double"
          animation__breathe="property:scale;from:1 1 1;to:1.03 1.03 1.03;dur:3000;easing:easeInOutSine;loop:true;dir:alternate">
        </a-image>
        <!-- 魔法陣：作為 YU 的子元素，拖曳時自動跟著移動 -->
        <a-entity position="0 -0.18 -0.017">
          <a-torus radius="0.065" radius-tubular="0.004"
            color="#FFD700" emissive="#FFD700" emissive-intensity="0.95" metalness="0" roughness="1" opacity="0.85"
            animation="property:rotation;from:0 0 0;to:0 0 360;dur:5000;loop:true;easing:linear"></a-torus>
          <a-torus radius="0.044" radius-tubular="0.003"
            color="#FFA500" emissive="#FFA500" emissive-intensity="0.9" metalness="0" roughness="1" opacity="0.75"
            animation="property:rotation;from:0 0 360;to:0 0 0;dur:3500;loop:true;easing:linear"></a-torus>
          <a-circle radius="0.068" rotation="-90 0 0"
            color="#FFD700" emissive="#FFD700" emissive-intensity="0.4" metalness="0" roughness="1" opacity="0.18"
            material="transparent:true;side:double"
            animation="property:scale;from:0.88 0.88 0.88;to:1.12 1.12 1.12;dur:2500;easing:easeInOutSine;loop:true;dir:alternate">
          </a-circle>
        </a-entity>
      </a-entity>

      <!-- 📜 右上文字面板 -->
      <a-entity class="draggable"
                data-float-amp="0.025" data-float-dur="2800"
                position="0.30 0.22 0.038">
        <a-image src="#text-tr" width="0.37" height="0.20"
          material="transparent:true;alphaTest:0.18;side:double"
          animation__sway="property:rotation;from:0 0 -1.5;to:0 0 1.5;dur:4500;easing:easeInOutSine;loop:true;dir:alternate">
        </a-image>
      </a-entity>

      <!-- 📜 左下文字面板 -->
      <a-entity class="draggable"
                data-float-amp="0.025" data-float-dur="3200"
                position="-0.37 -0.16 0.038">
        <a-image src="#text-bl" width="0.24" height="0.22"
          material="transparent:true;alphaTest:0.18;side:double"
          animation__sway="property:rotation;from:0 0 1.2;to:0 0 -1.2;dur:5000;easing:easeInOutSine;loop:true;dir:alternate">
        </a-image>
      </a-entity>

      <!-- 📜 右下文字面板 -->
      <a-entity class="draggable"
                data-float-amp="0.025" data-float-dur="3600"
                position="0.30 -0.32 0.038">
        <a-image src="#text-br" width="0.36" height="0.21"
          material="transparent:true;alphaTest:0.18;side:double"
          animation__sway="property:rotation;from:0 0 -1.0;to:0 0 1.0;dur:5500;easing:easeInOutSine;loop:true;dir:alternate">
        </a-image>
      </a-entity>

      <!-- ⭐ 星星 -->
      <a-sphere position="-0.35 0.35 0.06" radius="0.020" color="#FFE200" emissive="#FFE200" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.35 0.35 0.06;to:-0.35 0.375 0.06;dur:1600;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="-0.18 0.40 0.08" radius="0.016" color="#FFF4A0" emissive="#FFF4A0" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.18 0.40 0.08;to:-0.18 0.425 0.08;dur:2100;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="-0.42 0.22 0.05" radius="0.014" color="#FFD700" emissive="#FFD700" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.42 0.22 0.05;to:-0.42 0.245 0.05;dur:1900;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.02 0.42 0.10"  radius="0.022" color="#FFFACD" emissive="#FFFACD" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.02 0.42 0.10;to:0.02 0.445 0.10;dur:1400;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.10 0.36 0.07"  radius="0.015" color="#FFE200" emissive="#FFE200" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.10 0.36 0.07;to:0.10 0.385 0.07;dur:2300;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="-0.08 0.30 0.09" radius="0.017" color="#FFF4A0" emissive="#FFF4A0" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.08 0.30 0.09;to:-0.08 0.325 0.09;dur:1750;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.30 0.40 0.08"  radius="0.018" color="#FFEAA7" emissive="#FFEAA7" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.30 0.40 0.08;to:0.30 0.425 0.08;dur:2000;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.42 0.30 0.06"  radius="0.013" color="#FFD700" emissive="#FFD700" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.42 0.30 0.06;to:0.42 0.325 0.06;dur:1500;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.38 0.12 0.05"  radius="0.015" color="#FFF4A0" emissive="#FFF4A0" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.38 0.12 0.05;to:0.38 0.145 0.05;dur:2200;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="-0.28 0.14 0.07" radius="0.012" color="#FFE200" emissive="#FFE200" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.28 0.14 0.07;to:-0.28 0.165 0.07;dur:1300;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.22 0.22 0.05"  radius="0.013" color="#FFFACD" emissive="#FFFACD" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.22 0.22 0.05;to:0.22 0.245 0.05;dur:1850;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="-0.10 0.20 0.08" radius="0.011" color="#FFD700" emissive="#FFD700" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.10 0.20 0.08;to:-0.10 0.225 0.08;dur:2400;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="0.15 0.44 0.11"  radius="0.019" color="#FFEAA7" emissive="#FFEAA7" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:0.15 0.44 0.11;to:0.15 0.465 0.11;dur:1650;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
      <a-sphere position="-0.45 0.38 0.05" radius="0.012" color="#FFE200" emissive="#FFE200" emissive-intensity="1" metalness="0" roughness="1" animation="property:position;from:-0.45 0.38 0.05;to:-0.45 0.405 0.05;dur:2000;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>

      <!-- 🌙 月亮 -->
      <a-entity position="0.22 0.32 0.08"
        animation__float="property:position;from:0.22 0.32 0.08;to:0.22 0.345 0.08;dur:4000;easing:easeInOutSine;loop:true;dir:alternate"
        animation__rock="property:rotation;from:0 0 -4;to:0 0 4;dur:7000;easing:easeInOutSine;loop:true;dir:alternate">
        <a-sphere radius="0.050" color="#FFF8DC" emissive="#FFF8DC" emissive-intensity="0.85" metalness="0" roughness="1">
          <a-sphere radius="1.45" color="#FFFACD" emissive="#FFFACD" emissive-intensity="0.15" metalness="0" roughness="1" opacity="0.22" material="transparent:true;side:back"></a-sphere>
        </a-sphere>
        <!-- 新月暗面移除：難以精準定位，純發光球效果更乾淨 -->
      </a-entity>

      <!-- ☁️ 雲朵 -->
      <a-entity position="-0.30 0.27 0.04" animation="property:position;from:-0.30 0.27 0.04;to:-0.26 0.27 0.04;dur:5000;easing:easeInOutSine;loop:true;dir:alternate">
        <a-sphere position="0 0 0"          radius="0.028" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="0.4" metalness="0" roughness="1" opacity="0.55"></a-sphere>
        <a-sphere position="0.026 0.008 0"  radius="0.022" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="0.4" metalness="0" roughness="1" opacity="0.50"></a-sphere>
        <a-sphere position="-0.020 0.006 0" radius="0.020" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="0.4" metalness="0" roughness="1" opacity="0.45"></a-sphere>
      </a-entity>
      <a-entity position="0.06 0.37 0.06" animation="property:position;from:0.06 0.37 0.06;to:0.10 0.37 0.06;dur:6500;easing:easeInOutSine;loop:true;dir:alternate">
        <a-sphere position="0 0 0"          radius="0.025" color="#E8F4FF" emissive="#E8F4FF" emissive-intensity="0.3" metalness="0" roughness="1" opacity="0.50"></a-sphere>
        <a-sphere position="0.022 0.007 0"  radius="0.020" color="#E8F4FF" emissive="#E8F4FF" emissive-intensity="0.3" metalness="0" roughness="1" opacity="0.45"></a-sphere>
      </a-entity>
      <a-entity position="0.34 0.24 0.04" animation="property:position;from:0.34 0.24 0.04;to:0.30 0.24 0.04;dur:5800;easing:easeInOutSine;loop:true;dir:alternate">
        <a-sphere position="0 0 0"          radius="0.026" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="0.35" metalness="0" roughness="1" opacity="0.48"></a-sphere>
        <a-sphere position="0.024 0.008 0"  radius="0.020" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="0.35" metalness="0" roughness="1" opacity="0.42"></a-sphere>
      </a-entity>

      <a-entity id="sparkles-container"></a-entity>
      <a-entity id="yu-particles"></a-entity>

    </a-entity>
  </a-scene>

  <script>
    // ============================================================
    //  drag-system：通用拖曳管理器，掛在 <a-scene> 上
    //
    //  使用方式：在任何 <a-entity> 加上：
    //    class="draggable"
    //    data-float-amp="0.03"   (浮動幅度，AR 單位)
    //    data-float-dur="2200"   (浮動週期，毫秒)
    //  → 該元素就自動可以拖曳，放開後恢復漂浮動畫
    // ============================================================
    AFRAME.registerComponent('drag-system', {
      init: function () {
        const scene    = this.el;
        const SENS     = 0.004;   // 每像素對應的 AR 單位（可調）
        const HIT_PX   = 115;     // 點擊偵測半徑（螢幕像素）

        let active     = null;    // 目前被拖曳的元素
        let startTX, startTY;
        let startPX, startPY, startPZ;

        // ── 取得元素的螢幕座標 ──────────────────────────────
        const toScreen = (el) => {
          const v = new THREE.Vector3();
          el.object3D.getWorldPosition(v);
          v.project(scene.camera);
          return {
            x: (v.x + 1) / 2 * scene.canvas.clientWidth,
            y: (-v.y + 1) / 2 * scene.canvas.clientHeight
          };
        };

        // ── 停止浮動動畫 ─────────────────────────────────────
        const pause = (el) => {
          el.removeAttribute('animation__float');
          // 小放大給「抓住」的觸感回饋
          el.setAttribute('animation__grab', {
            property:'scale', from:'1 1 1', to:'1.06 1.06 1.06',
            dur:180, easing:'easeOutQuad'
          });
        };

        // ── 放開後重新啟動漂浮，以當前位置為基準 ─────────────
        const resume = (el) => {
          el.removeAttribute('animation__grab');
          const p   = el.getAttribute('position');
          const amp = parseFloat(el.dataset.floatAmp || 0.025);
          const dur = parseInt(el.dataset.floatDur   || 2500);
          el.setAttribute('animation__float', {
            property: 'position',
            from: `${p.x} ${p.y} ${p.z}`,
            to:   `${p.x} ${p.y + amp} ${p.z}`,
            dur, easing:'easeInOutSine', loop:true, dir:'alternate'
          });
        };

        // ── touchstart：找最近的 draggable ──────────────────
        scene.canvas.addEventListener('touchstart', (e) => {
          const t = e.touches[0];
          let best = null, bestD = HIT_PX;

          document.querySelectorAll('.draggable').forEach(el => {
            const sp = toScreen(el);
            const d  = Math.hypot(t.clientX - sp.x, t.clientY - sp.y);
            if (d < bestD) { bestD = d; best = el; }
          });

          if (!best) return;
          active = best;
          startTX = t.clientX; startTY = t.clientY;
          const p = active.getAttribute('position');
          startPX = p.x; startPY = p.y; startPZ = p.z;
          pause(active);
          e.preventDefault();
        }, { passive:false });

        // ── touchmove：移動 active 元素 ─────────────────────
        scene.canvas.addEventListener('touchmove', (e) => {
          if (!active) return;
          const t = e.touches[0];
          active.setAttribute('position', {
            x: startPX + (t.clientX - startTX) * SENS,
            y: startPY - (t.clientY - startTY) * SENS,
            z: startPZ
          });
          e.preventDefault();
        }, { passive:false });

        // ── touchend / cancel：放開 ──────────────────────────
        const onEnd = () => { if (active) { resume(active); active = null; } };
        scene.canvas.addEventListener('touchend',    onEnd);
        scene.canvas.addEventListener('touchcancel', onEnd);
      }
    });

    // ── 粒子生成 ─────────────────────────────────────────────
    AFRAME.registerComponent('spawn-effects', {
      init: function () {
        const yuP = document.getElementById('yu-particles');
        for (let i = 0; i < 14; i++) {
          const el  = document.createElement('a-sphere');
          const ang = (i/14)*Math.PI*2;
          const rx  = Math.cos(ang)*(0.05+Math.random()*0.025);
          const rz  = Math.sin(ang)*(0.05+Math.random()*0.025)*0.4;
          const fy  = -0.22, ty = fy+0.18+Math.random()*0.18;
          const dur = 1100+i*160, delay = i*90;
          el.setAttribute('position',`${(0.03+rx).toFixed(3)} ${fy} ${(0.012+rz).toFixed(3)}`);
          el.setAttribute('radius',(0.005+Math.random()*0.005).toFixed(4));
          el.setAttribute('color','#FFD700'); el.setAttribute('emissive','#FFD700');
          el.setAttribute('emissive-intensity','1'); el.setAttribute('metalness','0'); el.setAttribute('roughness','1');
          el.setAttribute('animation__rise',`property:position;from:${(0.03+rx).toFixed(3)} ${fy} ${(0.012+rz).toFixed(3)};to:${(0.03+rx*0.4).toFixed(3)} ${ty.toFixed(3)} ${(0.012+rz*0.3).toFixed(3)};dur:${dur};delay:${delay};easing:easeOutQuad;loop:true`);
          el.setAttribute('animation__fade',`property:scale;from:1 1 1;to:0.05 0.05 0.05;dur:${dur};delay:${delay};easing:easeInQuad;loop:true`);
          yuP.appendChild(el);
        }
        const sc = document.getElementById('sparkles-container');
        const colors = ['#FFE566','#FFFFFF','#B8E0FF','#FFD6FF','#C0FFE8'];
        for (let i = 0; i < 14; i++) {
          const el  = document.createElement('a-sphere');
          const x   = (Math.random()-0.5)*0.86, y=(Math.random()-0.5)*0.76, z=0.03+Math.random()*0.06;
          const r   = 0.006+Math.random()*0.007, dur=900+Math.random()*1400, delay=Math.random()*3500;
          const col = colors[Math.floor(Math.random()*colors.length)], fs=(0.2+Math.random()*0.4).toFixed(2);
          el.setAttribute('position',`${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`);
          el.setAttribute('radius',r.toFixed(4));
          el.setAttribute('color',col); el.setAttribute('emissive',col);
          el.setAttribute('emissive-intensity','1'); el.setAttribute('metalness','0'); el.setAttribute('roughness','1');
          el.setAttribute('animation',`property:scale;from:${fs} ${fs} ${fs};to:1 1 1;dur:${Math.round(dur)};delay:${Math.round(delay)};easing:easeInOutSine;loop:true;dir:alternate`);
          sc.appendChild(el);
        }

        // 啟動每個 draggable 的初始漂浮動畫
        document.querySelectorAll('.draggable').forEach(el => {
          const p   = el.getAttribute('position');
          const amp = parseFloat(el.dataset.floatAmp || 0.025);
          const dur = parseInt(el.dataset.floatDur   || 2500);
          el.setAttribute('animation__float', {
            property:'position',
            from:`${p.x} ${p.y} ${p.z}`,
            to:`${p.x} ${p.y+amp} ${p.z}`,
            dur, easing:'easeInOutSine', loop:true, dir:'alternate'
          });
        });
      }
    });

    document.querySelector('a-scene').setAttribute('spawn-effects','');

    const hint   = document.getElementById('hint');
    const dHint  = document.getElementById('drag-hint');
    const anchor = document.getElementById('book-anchor');
    anchor.addEventListener('targetFound', () => {
      hint.classList.add('hidden');
      dHint.classList.add('show');
      setTimeout(() => dHint.classList.remove('show'), 3000);
    });
    anchor.addEventListener('targetLost', () => hint.classList.remove('hidden'));
  </script>
</body>
</html>
